<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>a quiet letter | birthday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* main app container */
        .app {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }

        /* each section: full viewport, centered content */
        .section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s linear 0.6s;
            overflow-y: auto;
            padding: 2rem;
        }

        .section.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s linear 0s;
        }

        /* content containers */
        .container {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
        }

        /* ---- INTRO SECTION (minimal, blurred) ---- */
        .intro-bg {
            background: rgba(245, 240, 235, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .intro-card {
            text-align: center;
            max-width: 380px;
            margin: 0 auto;
        }

        .intro-text {
            font-size: 1rem;
            font-weight: 380;
            letter-spacing: 0.3px;
            color: #2c2e31;
            margin-bottom: 2.2rem;
            opacity: 0.75;
        }

        .password-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 48px;
            padding: 0.9rem 1.6rem;
            font-size: 1rem;
            width: 240px;
            text-align: center;
            font-family: 'Inter', monospace;
            letter-spacing: 1px;
            color: #1f1f1f;
            outline: none;
            transition: all 0.2s;
            font-weight: 400;
            background: rgba(250, 250, 252, 0.7);
        }

        .password-input:focus {
            border-color: rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.02);
        }

        .error-message {
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: #bc6f6f;
            min-height: 2rem;
            font-weight: 380;
            letter-spacing: 0.2px;
        }

        .shake {
            animation: gentleShake 0.32s ease-in-out 0s 1;
        }

        @keyframes gentleShake {
            0% { transform: translateX(0); }
            30% { transform: translateX(-4px); }
            70% { transform: translateX(4px); }
            100% { transform: translateX(0); }
        }

        /* ---- LETTER SECTION (real paper style) ---- */
        .paper-section {
            background: #faf8f3;
        }

        .paper-card {
            background: #fefcf7;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            padding: 2.8rem 2.4rem;
            position: relative;
            transition: all 0.2s;
        }

        /* faint horizontal lines (notebook feel) */
        .paper-card::before {
            content: "";
            position: absolute;
            top: 3rem;
            left: 10%;
            width: 80%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                rgba(180, 170, 150, 0.12) 0px,
                rgba(180, 170, 150, 0.12) 1px,
                transparent 1px,
                transparent 28px
            );
            pointer-events: none;
        }

        .letter-title {
            font-family: 'Inter', serif;
            font-weight: 420;
            font-size: 1.3rem;
            letter-spacing: -0.2px;
            color: #413a33;
            border-bottom: 1px solid rgba(120, 100, 80, 0.18);
            display: inline-block;
            padding-bottom: 6px;
            margin-bottom: 2rem;
        }

        .letter-content {
            font-family: 'Inter', 'Times New Roman', serif;
            font-size: 1rem;
            line-height: 1.85;
            color: #2c2823;
            font-weight: 380;
            text-align: left;
            word-break: break-word;
        }

        .letter-line {
            margin-bottom: 0.9rem;
        }

        .letter-paragraph {
            margin-bottom: 1.25rem;
            white-space: pre-wrap;
        }

        /* each character inline animation */
        .char {
            display: inline;
            opacity: 0;
            animation: charReveal 0.02s forwards;
        }

        @keyframes charReveal {
            from { opacity: 0; transform: translateY(2px); filter: blur(0.6px);}
            to { opacity: 1; transform: translateY(0); filter: blur(0);}
        }

        .scroll-hint {
            margin-top: 2.2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #9e9489;
            letter-spacing: 0.4px;
            font-weight: 350;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* ---- GALLERY SECTION (soft) ---- */
        .gallery-bg {
            background: #f2efe9;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.4rem;
            margin: 2rem 0 2rem;
        }

        .gallery-item {
            background: #e9e4db;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.97);
            animation: galleryFade 0.6s forwards;
            transition: transform 0.25s ease, box-shadow 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }

        @keyframes galleryFade {
            to { opacity: 1; transform: scale(1); }
        }

        .gallery-item:hover {
            transform: scale(1.01);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* MODAL (popup) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 28, 26, 0.85);
            backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0s linear 0.25s;
        }
        .modal.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.3s ease, visibility 0s linear 0s;
        }
        .modal-inner {
            max-width: 85vw;
            max-height: 85vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-inner img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
            background: #f2ede5;
        }
        .modal-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            padding: 0 0.5rem;
        }
        .nav-circle {
            background: rgba(30, 28, 26, 0.4);
            backdrop-filter: blur(6px);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 300;
            color: #e2dbd2;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
            border: 1px solid rgba(255,245,235,0.3);
        }
        .nav-circle:hover {
            background: rgba(50, 45, 40, 0.6);
            color: white;
        }
        .close-modal-x {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 1.8rem;
            font-weight: 300;
            color: #efe3d6;
            cursor: pointer;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
        }
        .close-modal-x:hover {
            background: rgba(0,0,0,0.4);
        }

        /* ---- BIRTHDAY SECTION (calm emotional) ---- */
        .birthday-bg {
            background: #f4f0ea;
        }
        .birthday-container {
            text-align: center;
        }
        .birthday-phrase {
            font-size: 3.2rem;
            font-family: 'Inter', 'Playfair Display', serif;
            font-weight: 420;
            letter-spacing: -0.5px;
            color: #3b3530;
            word-break: break-word;
        }
        .char-birthday {
            display: inline;
            opacity: 0;
            animation: charRevealSlow 0.04s forwards;
        }
        @keyframes charRevealSlow {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0);}
        }

        /* subtle particles (very low intensity) */
        .particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* ---- FINAL SECTION (thank you, slow animation) ---- */
        .final-bg {
            background: #f2efe9;
        }
        .final-container {
            text-align: center;
        }
        .thankyou-text {
            font-size: 2.6rem;
            font-weight: 390;
            font-family: 'Inter', serif;
            letter-spacing: -0.3px;
            color: #2f2b27;
        }
        .char-final {
            display: inline;
            opacity: 0;
            animation: finalCharReveal 0.07s forwards;
        }
        @keyframes finalCharReveal {
            from { opacity: 0; transform: translateY(6px); filter: blur(1px);}
            to { opacity: 1; transform: translateY(0); filter: blur(0);}
        }

        .click-hint {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #9e9489;
            letter-spacing: 0.3px;
            cursor: pointer;
        }

        /* scroll behaviour */
        .section::-webkit-scrollbar {
            width: 3px;
            background: transparent;
        }
        .section::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.15);
            border-radius: 20px;
        }
        @media (max-width: 580px) {
            .paper-card { padding: 1.8rem; }
            .birthday-phrase { font-size: 2.2rem; }
            .thankyou-text { font-size: 2rem; }
            .gallery-grid { gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- 1. INTRO SECTION -->
    <div id="introSection" class="section intro-bg active">
        <div class="container intro-card">
            <p class="intro-text">Enter to reveal something special</p>
            <input type="password" id="passwordField" class="password-input" placeholder="······" maxlength="6" autocomplete="off">
            <div id="errorMsg" class="error-message"></div>
        </div>
    </div>

    <!-- 2. LETTER SECTION (paper style, letter-by-letter) -->
    <div id="letterSection" class="section paper-section">
        <div class="container">
            <div class="paper-card">
                <div class="letter-title">a note for you</div>
                <div id="letterTextContainer" class="letter-content"></div>
                <div class="scroll-hint" id="letterNextHint">↓ click anywhere to continue ↓</div>
            </div>
        </div>
    </div>

    <!-- 3. GALLERY SECTION -->
    <div id="gallerySection" class="section gallery-bg">
        <div class="container">
            <div id="galleryGrid" class="gallery-grid"></div>
            <div class="scroll-hint" id="galleryNextHint" style="margin-top: 0.8rem;">click anywhere to continue</div>
        </div>
    </div>

    <!-- 4. BIRTHDAY SECTION -->
    <div id="birthdaySection" class="section birthday-bg">
        <div class="container birthday-container">
            <div id="birthdayPhrase" class="birthday-phrase"></div>
        </div>
    </div>

    <!-- 5. FINAL SECTION -->
    <div id="finalSection" class="section final-bg">
        <div class="container final-container">
            <div id="finalPhrase" class="thankyou-text"></div>
            <div class="click-hint" id="finalHint">—</div>
        </div>
    </div>

    <!-- MODAL for gallery -->
    <div id="imageModal" class="modal">
        <div class="modal-inner">
            <img id="modalImage" src="" alt="">
            <div class="modal-nav">
                <div id="modalPrev" class="nav-circle">←</div>
                <div id="modalNext" class="nav-circle">→</div>
            </div>
            <div id="closeModalBtn" class="close-modal-x">✕</div>
        </div>
    </div>

    <canvas id="particleCanvas" class="particle-canvas"></canvas>
</div>

<script>
    // ---------- PASSWORD (serene, 4-6 chars): "serene" (6 letters - calming) ----------
    const CORRECT_PASSWORD = "serene";

    // DOM elements
    const introSec = document.getElementById('introSection');
    const letterSec = document.getElementById('letterSection');
    const gallerySec = document.getElementById('gallerySection');
    const birthdaySec = document.getElementById('birthdaySection');
    const finalSec = document.getElementById('finalSection');
    const pwdInput = document.getElementById('passwordField');
    const errorMsgDiv = document.getElementById('errorMsg');
    const letterContainer = document.getElementById('letterTextContainer');
    const galleryGrid = document.getElementById('galleryGrid');
    const birthdayDiv = document.getElementById('birthdayPhrase');
    const finalDiv = document.getElementById('finalPhrase');

    // modal
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const prevModalBtn = document.getElementById('modalPrev');
    const nextModalBtn = document.getElementById('modalNext');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // gallery images (soft, peaceful, unsplash images)
    const galleryImages = [
        "https://images.pexels.com/photos/924824/pexels-photo-924824.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop",
        "https://images.pexels.com/photos/1252869/pexels-photo-1252869.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop",
        "https://images.pexels.com/photos/1486974/pexels-photo-1486974.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop",
        "https://images.pexels.com/photos/2356045/pexels-photo-2356045.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop",
        "https://images.pexels.com/photos/1266808/pexels-photo-1266808.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop",
        "https://images.pexels.com/photos/2662116/pexels-photo-2662116.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop"
    ];
    let currentModalIndex = 0;

    // ----- helper: switch sections
    function switchToSection(sectionToShow) {
        const sections = [introSec, letterSec, gallerySec, birthdaySec, finalSec];
        sections.forEach(sec => {
            if (sec === sectionToShow) {
                sec.classList.add('active');
            } else {
                sec.classList.remove('active');
            }
        });
    }

    // ----- letter-by-letter animation (full letter content)
    function animateLetterText() {
        // longer, meaningful letter (full page feel)
        const fullLetter = `Dear you,\n\nThere are moments that feel like quiet sunlight — soft, warm, and unannounced. I wanted to capture one of those moments here, in this small letter, just for you.\n\nI hope you know how much your presence means. You have a way of making things feel a little lighter, a little more honest. I wanted to take a breath and let you know: you matter. Simply, deeply.\n\nOn your birthday — and every ordinary day — I hope you give yourself the same kindness you give everyone else. Laugh without reason, rest without guilt, and always stay close to what brings you peace.\n\nHere's to you, to gentle moments, and to the beautiful quiet that follows.\n\nWith gratitude.`;
        
        letterContainer.innerHTML = '';
        // split into characters (including spaces & newlines)
        const chars = fullLetter.split('');
        let charSpans = [];
        for (let i = 0; i < chars.length; i++) {
            let ch = chars[i];
            if (ch === '\n') {
                const br = document.createElement('br');
                letterContainer.appendChild(br);
                // also we need to handle newline as separate, but for animation we don't wrap br with span; fine
                continue;
            }
            const span = document.createElement('span');
            span.className = 'char';
            span.textContent = ch;
            span.style.animationDelay = `${i * 18}ms`;   // letter-by-letter with ~18ms gap = smooth reading
            letterContainer.appendChild(span);
            charSpans.push(span);
        }
        // add a small extra so last characters appear
    }

    // animate birthday phrase letter-by-letter
    function animateBirthdayMessage() {
        const text = "Happy Birthday";
        birthdayDiv.innerHTML = '';
        const chars = text.split('');
        chars.forEach((ch, idx) => {
            const span = document.createElement('span');
            span.className = 'char-birthday';
            span.textContent = ch;
            span.style.animationDelay = `${idx * 70}ms`; // slower emotional
            birthdayDiv.appendChild(span);
        });
        startSubtleParticles(2200);
    }

    // animate "Thank You" slower
    function animateThankYou() {
        const phrase = "Thank You";
        finalDiv.innerHTML = '';
        const chars = phrase.split('');
        chars.forEach((ch, idx) => {
            const span = document.createElement('span');
            span.className = 'char-final';
            span.textContent = ch;
            span.style.animationDelay = `${idx * 120}ms`; // calm, slow
            finalDiv.appendChild(span);
        });
    }

    // ----- very subtle particle effect (low intensity)
    let particleAnim = null;
    let particlesActive = false;
    function startSubtleParticles(duration = 2500) {
        const canvas = document.getElementById('particleCanvas');
        if (!canvas) return;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');
        if (particleAnim) cancelAnimationFrame(particleAnim);
        let particles = [];
        const particleCount = 32;
        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2.2 + 0.8,
                alpha: Math.random() * 0.28 + 0.1,
                vy: Math.random() * 0.4 + 0.1,
                vx: (Math.random() - 0.5) * 0.2
            });
        }
        let startTime = performance.now();
        function drawParticles(now) {
            const elapsed = now - startTime;
            if (elapsed > duration) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particlesActive = false;
                particleAnim = null;
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                p.y += p.vy;
                p.x += p.vx;
                if (p.y > canvas.height + 20) p.y = -20;
                if (p.x > canvas.width + 30) p.x = -30;
                if (p.x < -30) p.x = canvas.width + 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(199, 180, 150, ${p.alpha * 0.7})`;
                ctx.fill();
            }
            particleAnim = requestAnimationFrame(drawParticles);
        }
        particleAnim = requestAnimationFrame(drawParticles);
    }

    // ----- render gallery with fade-ins
    function renderGallery() {
        galleryGrid.innerHTML = '';
        galleryImages.forEach((src, idx) => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.style.animationDelay = `${idx * 70}ms`;
            const img = document.createElement('img');
            img.src = src;
            img.alt = `memory ${idx+1}`;
            img.loading = 'lazy';
            item.appendChild(img);
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                currentModalIndex = idx;
                openModal(src);
            });
            galleryGrid.appendChild(item);
        });
    }

    function openModal(src) {
        modalImg.src = src;
        modal.classList.add('active');
    }
    function closeModal() {
        modal.classList.remove('active');
    }
    function nextImage() {
        currentModalIndex = (currentModalIndex + 1) % galleryImages.length;
        modalImg.src = galleryImages[currentModalIndex];
    }
    function prevImage() {
        currentModalIndex = (currentModalIndex - 1 + galleryImages.length) % galleryImages.length;
        modalImg.src = galleryImages[currentModalIndex];
    }

    // ----- navigation: click on section or hint advances (letter -> gallery -> birthday -> final)
    let letterNavigated = false;
    let galleryNavigated = false;
    let birthdayNavigated = false;

    function setupSectionAdvance() {
        // Letter section: click anywhere advances to gallery if letter animation finished
        const letterSectionDiv = letterSec;
        const letterNextHint = document.getElementById('letterNextHint');
        const goToGallery = () => {
            if (!letterNavigated) {
                letterNavigated = true;
                switchToSection(gallerySec);
                renderGallery();
            }
        };
        letterSectionDiv.addEventListener('click', (e) => {
            if (!letterNavigated) goToGallery();
        });
        if (letterNextHint) letterNextHint.addEventListener('click', (e) => { e.stopPropagation(); goToGallery(); });

        // Gallery section: click anywhere moves to birthday section
        const gallerySecDiv = gallerySec;
        const galleryHint = document.getElementById('galleryNextHint');
        const goToBirthday = () => {
            if (!galleryNavigated) {
                galleryNavigated = true;
                switchToSection(birthdaySec);
                animateBirthdayMessage();
            }
        };
        gallerySecDiv.addEventListener('click', (e) => {
            if (!galleryNavigated && e.target.closest('.modal') === null) goToBirthday();
        });
        if (galleryHint) galleryHint.addEventListener('click', (e) => { e.stopPropagation(); goToBirthday(); });

        // Birthday section: click moves to final
        const birthdaySecDiv = birthdaySec;
        const goToFinal = () => {
            if (!birthdayNavigated) {
                birthdayNavigated = true;
                switchToSection(finalSec);
                animateThankYou();
            }
        };
        birthdaySecDiv.addEventListener('click', goToFinal);
        // Final section stays, loop end, no further transition.
    }

    // ---- password action (enter key OR clicking anywhere on intro? but only enter to avoid confusion)
    function verifyAndUnlock() {
        const pwd = pwdInput.value.trim().toLowerCase();
        if (pwd === CORRECT_PASSWORD) {
            errorMsgDiv.textContent = '';
            // correct: smooth fade transition to letter section
            switchToSection(letterSec);
            animateLetterText();
            // reset navigated flags for potential replay, but not needed
            letterNavigated = false;
            galleryNavigated = false;
            birthdayNavigated = false;
        } else {
            errorMsgDiv.textContent = '✧ not quite. try again. ✧';
            pwdInput.classList.add('shake');
            setTimeout(() => pwdInput.classList.remove('shake'), 350);
            setTimeout(() => { if (errorMsgDiv.textContent.includes('not quite')) errorMsgDiv.textContent = ''; }, 1800);
        }
    }

    pwdInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyAndUnlock();
    });
    // no visible button: but we allow password submission via enter – elegant.

    // modal listeners
    prevModalBtn.addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
    nextModalBtn.addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // window resize for particles minimal
    window.addEventListener('resize', () => {
        const canvas = document.getElementById('particleCanvas');
        if (canvas && particlesActive) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    });

    setupSectionAdvance();
    // ensure gallery render on needed time, but only when switch
    // preload any other
    renderGallery(); // early but hidden, fine
    // set initial focus
    pwdInput.focus();
</script>
</body>
</html>
